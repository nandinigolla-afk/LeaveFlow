spring:
  application:
    name: leaveflow-pro

  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/leaveflow}
    username: ${DATABASE_USERNAME:leaveflow}
    password: ${DATABASE_PASSWORD:leaveflow}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
        jdbc:
          batch_size: 20
        default_schema: public

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB

server:
  port: ${PORT:8080}
  error:
    include-message: never
    include-binding-errors: never
    include-stacktrace: never

app:
  jwt:
    secret: ${JWT_SECRET:change-this-super-secret-key-in-production-min-256-bits}
    access-token-expiration-ms: ${JWT_ACCESS_EXPIRATION:900000}
    refresh-token-expiration-ms: ${JWT_REFRESH_EXPIRATION:604800000}

  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}

  frontend:
    reset-password-url: ${FRONTEND_URL:http://localhost:5173}/reset-password

  mail:
    from: ${MAIL_FROM:no-reply@leaveflow.pro}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
management:
  endpoint:
    health:
      show-details: never
  health:
    mail:
      enabled: false

logging:
  level:
    com.leaveflow: INFO
    org.springframework.security: WARN
